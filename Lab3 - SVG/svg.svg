<?xml version="1.0"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
    "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">

<svg version="1.1"
     xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="4in" height="4in"
     viewBox="0 0 800 800"
     preserveAspectRatio="xMidYMid">

<defs>
    <!-- JEDNA statyczna figura -->
    <g id="ksztalt">

        <circle cx="0" cy="0" r="25"
                fill="none" stroke="black" stroke-width="3"/>

        <line x1="-25" y1="0" x2="25" y2="0"
              stroke="black" stroke-width="2"/>

        <line x1="0" y1="-25" x2="0" y2="25"
              stroke="black" stroke-width="2"/>

        <line x1="-17.3" y1="-17.3" x2="17.3" y2="17.3"
              stroke="black" stroke-width="2"/>

        <line x1="17.3" y1="-17.3" x2="-17.3" y2="17.3"
              stroke="black" stroke-width="2"/>

    </g>
</defs>

<!-- 1 -->
<g transform="translate(165 125)">
    <g>
        <use href="#ksztalt"/>
        <animateTransform attributeName="transform"
                          type="rotate"
                          from="0"
                          to="360"
                          dur="2s"
                          repeatCount="indefinite"/>
    </g>
</g>

<!-- 2 -->
<g transform="translate(85 78)">
    <g>
        <use href="#ksztalt"/>
        <animateTransform attributeName="transform"
                          type="rotate"
                          from="0"
                          to="360"
                          dur="2s"
                          repeatCount="indefinite"/>
    </g>
</g>
<!-- 3 -->
<g transform="translate(370 125)">
    <g>
        <use href="#ksztalt"/>
        <animateTransform attributeName="transform"
                          type="rotate"
                          from="0 0 0"
                          to="360 0 0"
                          dur="3s"
                          repeatCount="indefinite"/>
    </g>
</g>

<!-- 4 -->
<g transform="translate(280 78)">
    <g>
        <use href="#ksztalt"/>
        <animateTransform attributeName="transform"
                          type="rotate"
                          from="0 0 0"
                          to="360 0 0"
                          dur="1.5s"
                          repeatCount="indefinite"/>
    </g>
</g>

<!-- 5 -->
<g transform="translate(270 425)">
    <g>
        <use href="#ksztalt"/>
        <animateTransform attributeName="transform"
                          type="rotate"
                          from="0 0 0"
                          to="360 0 0"
                          dur="2.5s"
                          repeatCount="indefinite"/>
    </g>
</g>

<!-- 6 -->
<g transform="translate(185 375)">
    <g>
        <use href="#ksztalt"/>
        <animateTransform attributeName="transform"
                          type="rotate"
                          from="0 0 0"
                          to="360 0 0"
                          dur="1.8s"
                          repeatCount="indefinite"/>
    </g>
</g>

<!-- prostokąt -->
<rect width="10" height="100"
      fill="red"
      x="120" y="50"
      transform="rotate(-60 125 100)"/>

<rect width="10" height="100"
      fill="red"
      x="220" y="350"
      transform="rotate(-60 225 400)"/>

<rect width="10" height="100"
      fill="red"
      x="320" y="50"
      transform="rotate(-60 325 100)"/>

<!-- trójkąt -->
<polygon points="100,200 150,200 125,100"
         fill="lightblue"
         stroke="black"
         stroke-width="3"/>

<polygon points="300,200 350,200 325,100"
         fill="yellow"
         stroke="black"
         stroke-width="3"/>

<polygon points="200,500 250,500 225,400"
         fill="green"
         stroke="black"
         stroke-width="3"/>

</svg>