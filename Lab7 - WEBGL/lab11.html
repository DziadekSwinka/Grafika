<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Lab 11 - WebGL Points</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: black;
  }

  canvas {
    display: block;
  }

  #help {
    position: fixed;
    left: 12px;
    top: 10px;
    z-index: 2;
    color: white;
    background: rgba(0, 0, 0, 0.65);
    font-family: Arial, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    padding: 8px 10px;
  }
</style>

<!--
  Sterowanie:
  Spacja - pauza / start animacji.
  C      - wlacza / wylacza losowe kolory z atrybutu a_color.
  1      - punkty jako kwadraty.
  2      - punkty jako dyski.
  3      - punkty jako romby.
  4      - punkty jako pieciokaty.
  5      - punkty jako szesciokaty.
  6      - szesciokat zanikajacy alfa od srodka do krawedzi.
  7      - pierscien z przezroczystymi krawedziami.
  R      - ponowna inicjalizacja punktow w srodku.

  Klikniecie lub przeciaganie lewym przyciskiem kieruje punkty w strone myszy.
  Klikniecie lewym przyciskiem dodatkowo ustawia wszystkie punkty w srodku.
-->

<script type="x-shader/x-vertex" id="vshader-source">
  attribute vec2 a_coords;
  attribute vec3 a_color;

  uniform float u_width;
  uniform float u_height;
  uniform float u_pointSize;

  varying vec3 v_color;

  void main() {
    float x = a_coords.x / u_width * 2.0 - 1.0;
    float y = 1.0 - a_coords.y / u_height * 2.0;

    gl_Position = vec4(x, y, 0.0, 1.0);
    gl_PointSize = u_pointSize;
    v_color = a_color;
  }
</script>

<script type="x-shader/x-fragment" id="fshader-source">
  #ifdef GL_FRAGMENT_PRECISION_HIGH
    precision highp float;
  #else
    precision mediump float;
  #endif

  uniform int u_style;

  varying vec3 v_color;

  const float PI = 3.141592653589793;

  float polygonMask(float sides, float radius, vec2 p) {
    float angle = atan(p.y, p.x) + PI;
    float sector = 2.0 * PI / sides;
    float local = mod(angle + sector * 0.5, sector) - sector * 0.5;
    return cos(local) * length(p) <= radius ? 1.0 : 0.0;
  }

  float polygonDistance(float sides, vec2 p) {
    float angle = atan(p.y, p.x) + PI;
    float sector = 2.0 * PI / sides;
    float local = mod(angle + sector * 0.5, sector) - sector * 0.5;
    return cos(local) * length(p);
  }

  void main() {
    vec2 p = gl_PointCoord - vec2(0.5);
    float dist = length(p);
    float alpha = 1.0;

    if (u_style == 1) {
      if (dist > 0.5) {
        discard;
      }
    }
    else if (u_style == 2) {
      if (abs(p.x) + abs(p.y) > 0.5) {
        discard;
      }
    }
    else if (u_style == 3) {
      if (polygonMask(5.0, 0.43, p) < 0.5) {
        discard;
      }
    }
    else if (u_style == 4) {
      if (polygonMask(6.0, 0.43, p) < 0.5) {
        discard;
      }
    }
    else if (u_style == 5) {
      float d = polygonDistance(6.0, p);
      if (d > 0.47) {
        discard;
      }
      alpha = 1.0 - smoothstep(0.0, 0.47, d);
    }
    else if (u_style == 6) {
      if (dist > 0.5 || dist < 0.25) {
        discard;
      }
      alpha = smoothstep(0.25, 0.33, dist) * (1.0 - smoothstep(0.42, 0.5, dist));
    }

    gl_FragColor = vec4(v_color, alpha);
  }
</script>

<script>
"use strict";

var canvas;
var gl;

var u_width_loc;
var u_height_loc;
var u_pointSize_loc;
var u_style_loc;
var a_coords_loc;
var a_color_loc;

var a_coords_buffer;
var a_color_buffer;

var POINT_COUNT = 300;
var POINT_SIZE = 32;

var positions = new Float32Array(2 * POINT_COUNT);
var velocities = new Float32Array(2 * POINT_COUNT);
var colors = new Float32Array(3 * POINT_COUNT);

var isRunning = true;
var isColorRandom = true;
var pointStyle = 0;
var mouseDown = false;

function randomizeColors() {
  for (var i = 0; i < POINT_COUNT; i++) {
    colors[3 * i] = 0.15 + 0.85 * Math.random();
    colors[3 * i + 1] = 0.15 + 0.85 * Math.random();
    colors[3 * i + 2] = 0.15 + 0.85 * Math.random();
  }
}

function createData() {
  randomizeColors();
  for (var i = 0; i < POINT_COUNT; i++) {
    positions[2 * i] = canvas.width / 2;
    positions[2 * i + 1] = canvas.height / 2;
    var speed = 2 + 6 * Math.random();
    var angle = 2 * Math.PI * Math.random();
    velocities[2 * i] = speed * Math.cos(angle);
    velocities[2 * i + 1] = speed * Math.sin(angle);
  }
}

function updateForFrame() {
  for (var i = 0; i < POINT_COUNT; i++) {
    positions[2 * i] += velocities[2 * i];
    if (positions[2 * i] < POINT_SIZE / 2 && velocities[2 * i] < 0) {
      positions[2 * i] += 2 * (POINT_SIZE / 2 - positions[2 * i]);
      velocities[2 * i] = Math.abs(velocities[2 * i]);
    }
    else if (positions[2 * i] > canvas.width - POINT_SIZE / 2 && velocities[2 * i] > 0) {
      positions[2 * i] -= 2 * (positions[2 * i] - canvas.width + POINT_SIZE / 2);
      velocities[2 * i] = -Math.abs(velocities[2 * i]);
    }

    positions[2 * i + 1] += velocities[2 * i + 1];
    if (positions[2 * i + 1] < POINT_SIZE / 2 && velocities[2 * i + 1] < 0) {
      positions[2 * i + 1] += 2 * (POINT_SIZE / 2 - positions[2 * i + 1]);
      velocities[2 * i + 1] = Math.abs(velocities[2 * i + 1]);
    }
    else if (positions[2 * i + 1] > canvas.height - POINT_SIZE / 2 && velocities[2 * i + 1] > 0) {
      positions[2 * i + 1] -= 2 * (positions[2 * i + 1] - canvas.height + POINT_SIZE / 2);
      velocities[2 * i + 1] = -Math.abs(velocities[2 * i + 1]);
    }
  }
}

function render() {
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.bindBuffer(gl.ARRAY_BUFFER, a_coords_buffer);
  gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STREAM_DRAW);
  gl.vertexAttribPointer(a_coords_loc, 2, gl.FLOAT, false, 0, 0);

  if (isColorRandom) {
    gl.bindBuffer(gl.ARRAY_BUFFER, a_color_buffer);
    gl.vertexAttribPointer(a_color_loc, 3, gl.FLOAT, false, 0, 0);
    gl.enableVertexAttribArray(a_color_loc);
  }
  else {
    gl.disableVertexAttribArray(a_color_loc);
    gl.vertexAttrib3f(a_color_loc, 1, 0, 0);
  }

  gl.uniform1i(u_style_loc, pointStyle);
  gl.drawArrays(gl.POINTS, 0, POINT_COUNT);

  if (gl.getError() !== gl.NO_ERROR) {
    console.log("During render, a GL error has been detected.");
  }
}

function doKey(evt) {
  var key = evt.keyCode;
  console.log("key pressed with keycode = " + key);

  if (key === 32) {
    isRunning = !isRunning;
    if (isRunning) {
      requestAnimationFrame(frame);
    }
    evt.preventDefault();
  }
  else if (key === 67) {
    isColorRandom = !isColorRandom;
    render();
  }
  else if (key >= 49 && key <= 55) {
    pointStyle = key - 49;
    render();
  }
  else if (key === 82) {
    createData();
    gl.bindBuffer(gl.ARRAY_BUFFER, a_color_buffer);
    gl.bufferData(gl.ARRAY_BUFFER, colors, gl.STATIC_DRAW);
    render();
  }
}

function initGL() {
  var prog = createProgram(gl, "vshader-source", "fshader-source", "a_coords");
  gl.useProgram(prog);

  u_width_loc = gl.getUniformLocation(prog, "u_width");
  u_height_loc = gl.getUniformLocation(prog, "u_height");
  u_pointSize_loc = gl.getUniformLocation(prog, "u_pointSize");
  u_style_loc = gl.getUniformLocation(prog, "u_style");
  a_coords_loc = gl.getAttribLocation(prog, "a_coords");
  a_color_loc = gl.getAttribLocation(prog, "a_color");

  gl.uniform1f(u_width_loc, canvas.width);
  gl.uniform1f(u_height_loc, canvas.height);
  gl.uniform1f(u_pointSize_loc, POINT_SIZE);
  gl.uniform1i(u_style_loc, pointStyle);

  a_coords_buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, a_coords_buffer);
  gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STREAM_DRAW);
  gl.vertexAttribPointer(a_coords_loc, 2, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(a_coords_loc);

  a_color_buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, a_color_buffer);
  gl.bufferData(gl.ARRAY_BUFFER, colors, gl.STATIC_DRAW);
  gl.vertexAttribPointer(a_color_loc, 3, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(a_color_loc);

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.clearColor(0, 0, 0, 1);

  if (gl.getError() !== gl.NO_ERROR) {
    console.log("During initialization, a GL error has been detected.");
  }
}

function createProgram(gl, vertexShaderID, fragmentShaderID, attribute0) {
  function getTextContent(elementID) {
    var element = document.getElementById(elementID);
    var node = element.firstChild;
    var str = "";
    while (node) {
      if (node.nodeType === 3) {
        str += node.textContent;
      }
      node = node.nextSibling;
    }
    return str;
  }

  var vertexShaderSource = getTextContent(vertexShaderID);
  var fragmentShaderSource = getTextContent(fragmentShaderID);
  var vsh = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vsh, vertexShaderSource);
  gl.compileShader(vsh);
  if (!gl.getShaderParameter(vsh, gl.COMPILE_STATUS)) {
    throw "Error in vertex shader: " + gl.getShaderInfoLog(vsh);
  }

  var fsh = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(fsh, fragmentShaderSource);
  gl.compileShader(fsh);
  if (!gl.getShaderParameter(fsh, gl.COMPILE_STATUS)) {
    throw "Error in fragment shader: " + gl.getShaderInfoLog(fsh);
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, vsh);
  gl.attachShader(prog, fsh);
  if (attribute0) {
    gl.bindAttribLocation(prog, 0, attribute0);
  }
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    throw "Link error in program: " + gl.getProgramInfoLog(prog);
  }
  return prog;
}

function frame() {
  if (isRunning) {
    updateForFrame();
    render();
    requestAnimationFrame(frame);
  }
}

function doResize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform1f(u_width_loc, canvas.width);
  gl.uniform1f(u_height_loc, canvas.height);
  if (!isRunning) {
    render();
  }
}

function headTowards(x, y) {
  for (var i = 0; i < POINT_COUNT; i++) {
    var dx = x - positions[2 * i];
    var dy = y - positions[2 * i + 1];
    var dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > 0.1) {
      var speed = Math.sqrt(
        velocities[2 * i] * velocities[2 * i] +
        velocities[2 * i + 1] * velocities[2 * i + 1]
      );
      velocities[2 * i] = dx / dist * speed;
      velocities[2 * i + 1] = dy / dist * speed;
    }
  }
}

function resetPositionsToCenter() {
  for (var i = 0; i < POINT_COUNT; i++) {
    positions[2 * i] = canvas.width / 2;
    positions[2 * i + 1] = canvas.height / 2;
  }
}

function doMouse(evt) {
  function move(moveEvt) {
    headTowards(moveEvt.clientX, moveEvt.clientY);
  }

  function up() {
    mouseDown = false;
    canvas.removeEventListener("mousemove", move, false);
    document.removeEventListener("mouseup", up, false);
  }

  if (evt.which !== 1) {
    return;
  }

  mouseDown = true;
  resetPositionsToCenter();
  headTowards(evt.clientX, evt.clientY);
  canvas.addEventListener("mousemove", move, false);
  document.addEventListener("mouseup", up, false);
}

function init() {
  try {
    canvas = document.createElement("canvas");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    gl = canvas.getContext("webgl", {
      alpha: false,
      depth: false,
      stencil: false
    });
    if (!gl) {
      throw "Browser does not support WebGL";
    }
  }
  catch (e) {
    var message = document.createElement("p");
    message.innerHTML = "Sorry, could not get a WebGL graphics context. Error: " + e;
    document.body.appendChild(message);
    return;
  }

  try {
    createData();
    initGL();
  }
  catch (e) {
    var error = document.createElement("p");
    error.innerHTML = "<pre>Sorry, could not initialize graphics context. Error:\n\n" + e + "</pre>";
    document.body.appendChild(error);
    return;
  }

  document.body.appendChild(canvas);
  window.addEventListener("resize", doResize);
  canvas.addEventListener("mousedown", doMouse);
  document.addEventListener("keydown", doKey);
  render();
  requestAnimationFrame(frame);
}
</script>
</head>
<body onload="init()">
<div id="help">
  Spacja: pauza/start |
  C: losowe/czerwone kolory |
  1-7: styl punktow |
  R: reset
</div>
<noscript>Sorry, this page requires JavaScript.</noscript>
</body>
</html>
