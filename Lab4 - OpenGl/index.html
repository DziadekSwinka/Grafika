<!DOCTYPE html>
<html>


<head>
<meta charset="UTF-8">

<script src="glsim.js"></script>

<script>

let rotateX = 15;
let rotateY = -15;
let rotateZ = 0;

let objectNumber = 1; // aktualny obiekt

// ---------------- KORKOCIĄG ----------------

function corkscrew() {

    glColor3f(0, 1, 0); // zielony

    glPointSize(2);

    glBegin(GL_POINTS);

    let turns = 8;

    for(let i = 0; i < 500; i++) {

        let t = i * 0.1;

        let x = Math.cos(t) * 0.3;
        let y = Math.sin(t) * 0.3;
        let z = -0.8 + t/5;

        glPointSize(1 + i/50);

        glVertex3f(x, y, z);
    }

    glEnd();
}

// ---------------- JEDEN TRÓJKĄT ----------------

function triangle() {

    glBegin(GL_TRIANGLES);

    glVertex3f(0, 0.8, 0);

    glVertex3f(-0.35, 0, 0);
    glVertex3f(0.35, 0, 0);

    glEnd();
}
function pyramid(n) {

    glColor3f(0.7, 0.4, 0.1);

    // ---------- ściany ----------

    for(let i = 0; i < n; i++) {

        glPushMatrix();

        // obrót kolejnej ściany
        glRotatef(i * 360/n, 0, 1, 0);

        // przesunięcie od środka
        glTranslatef(0, -0.5, 0.5);

        // pochylenie ściany do środka
        glRotatef(-55, 1, 0, 0);

        triangle();

        glPopMatrix();
    }

    // ---------- podstawa ----------

    glBegin(GL_TRIANGLE_FAN);

    glVertex3f(0, -0.5, 0);

    for(let i = 0; i <= n; i++) {

        let angle = 2 * Math.PI * i / n;

        let x = Math.cos(angle) * 0.5;
        let z = Math.sin(angle) * 0.5;

        glVertex3f(x, -0.5, z);
    }

    glEnd();
}

// ---------------- DISPLAY ----------------

function display() {

    glClear(GL_COLOR_BUFFER_BIT | GL_DEPTH_BUFFER_BIT);

    glLoadIdentity();

    glRotatef(rotateZ,0,0,1);
    glRotatef(rotateY,0,1,0);
    glRotatef(rotateX,1,0,0);

    if(objectNumber == 1)
        corkscrew();

    else if(objectNumber == 2)
        pyramid(6); // liczba boków podstawy
}

// ---------------- KLAWISZE ----------------

function doKeyDown(evt) {

    let key = evt.keyCode;

    if ( key == 49 ) // 1
        objectNumber = 1;

    else if ( key == 50 ) // 2
        objectNumber = 2;

    else if ( key == 37 )
        rotateY -= 15;

    else if ( key == 39 )
        rotateY += 15;

    else if ( key == 40)
        rotateX += 15;

    else if ( key == 38 )
        rotateX -= 15;

    else if ( key == 33 )
        rotateZ += 15;

    else if ( key == 34 )
        rotateZ -= 15;

    else if ( key == 36 )
        rotateX = rotateY = rotateZ = 0;

    display();
}
function initGL() {

    glMatrixMode(GL_PROJECTION);

    glOrtho(-1, 1, -1, 1, -2, 2);

    glMatrixMode(GL_MODELVIEW);

    glEnable(GL_DEPTH_TEST);

    glClearColor(0, 0, 0, 1);
}

function init() {

    try {
        glsimUse("glcanvas");
    }
    catch (e) {

        document.getElementById("canvas-holder").innerHTML =
            "Błąd: " + e;

        return;
    }

    document.onkeydown = doKeyDown;

    initGL();

    display();
}

</script>

</head>

<body onload="init()">

<div id="canvas-holder">
<canvas id="glcanvas" width="500" height="500"></canvas>
</div>

</body>
</html>
